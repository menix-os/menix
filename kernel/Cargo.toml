[package]
name = "menix"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "menix"
path = "src/main.rs"

[build-dependencies]

[dependencies]
bitflags = "2.6.0"
cfg-if = "1.0.0"
limine = "0.3.1"

[features]
default = ["smp", "boot_limine", "sys_acpi", "sys_pci", "sys_video"]

# Symmetric multi-processing.
smp = []

# Use Limine as the default bootloader.
boot_limine = []

# Use ACPI for hardware discovery. Available on x86_64, aarch64, riscv64 and loongarch64.
sys_acpi = []

# Use OpenFirmware (device trees) for hardware discovery. Available on aarch64 and riscv64.
sys_open_firmware = []

# PCI(e) device support.
sys_pci = []

# Video and framebuffer support.
sys_video = []
