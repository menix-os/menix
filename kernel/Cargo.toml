[package]
name = "kernel"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["dylib"]
name = "menix"
path = "src/menix.rs"

[build-dependencies]
bindgen = "0.71.0"

[dependencies]
bitflags = "2.6.0"
cfg-if = "1.0.0"
limine = "0.3.1"
seq-macro = "0.3.5"
spin = "0.9.8"

[features]
default = ["smp", "sys_acpi", "sys_pci", "sys_video"]

# Symmetric multi-processing.
smp = []

# Use ACPI for hardware discovery. Available on x86_64, aarch64, riscv64 and loongarch64.
sys_acpi = []

# Use OpenFirmware (device trees) for hardware discovery. Available on aarch64 and riscv64.
sys_open_firmware = []

# PCI(e) device support.
sys_pci = []

# Video and framebuffer support.
sys_video = []
